<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Nilton Xavier – Mr Dono Delas | Oficial</title>
                <script src="https://cdn.tailwindcss.com"></script>
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
                        <style>
                                body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
                                        .hero { background: linear-gradient(to bottom, rgba(0,0,0,0.3), #050505), url('https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=1920&q=80'); background-size: cover; height: 100vh; }
                                            </style>
                                            </head>
                                            <body>
                                                <nav class="fixed w-full z-50 p-6 flex justify-between items-center bg-black/50 backdrop-blur-md">
                                                        <div class="text-2xl font-black text-red-600">NILTON XAVIER</div>
                                                                <div class="space-x-6 font-bold text-sm uppercase">
                                                                            <a href="index.html" class="text-red-500">Início</a>
                                                                                        <a href="pages/musica.html">Músicas</a>
                                                                                                    <a href="admin/login.html" class="opacity-50">Admin</a>
                                                                                                            </div>
                                                                                                                </nav>

                                                                                                                    <section class="hero flex items-center justify-center text-center">
                                                                                                                            <div>
                                                                                                                                        <h2 class="text-red-500 font-bold tracking-widest uppercase mb-2">Mr Dono Delas</h2>
                                                                                                                                                    <h1 class="text-6xl md:text-9xl font-black mb-8">NILTON XAVIER</h1>
                                                                                                                                                                <div class="flex gap-4 justify-center">
                                                                                                                                                                                <a href="pages/musica.html" class="bg-red-600 px-10 py-4 rounded-full font-bold hover:scale-105 transition">OUVIR AGORA</a>
                                                                                                                                                                                            </div>
                                                                                                                                                                                                    </div>
                                                                                                                                                                                                        </section>

                                                                                                                                                                                                            <div class="bg-red-600 py-2 text-center font-bold">
                                                                                                                                                                                                                    VISITANTES: <span id="v-count">0</span>
                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                            <script type="module">
                                                                                                                                                                                                                                    import { db } from './assets/js/firebase-config.js';
                                                                                                                                                                                                                                            import { doc, updateDoc, increment, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
                                                                                                                                                                                                                                                    async function counter() {
                                                                                                                                                                                                                                                                const ref = doc(db, "stats", "visitors");
                                                                                                                                                                                                                                                                            try { await updateDoc(ref, { count: increment(1) });
                                                                                                                                                                                                                                                                                        const s = await getDoc(ref); document.getElementById('v-count').innerText = s.data().count;
                                                                                                                                                                                                                                                                                                    } catch { await setDoc(ref, { count: 1 }); }
                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                    counter();
                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                        </html>
