<!DOCTYPE html>
<html lang="pt-pt" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilton Xavier – Mr Dono Delas | Website Oficial</title>
    
    <!-- SEO & PWA -->
    <meta name="description" content="Website oficial do artista Nilton Xavier – Mr Dono Delas. Ouça as últimas músicas, veja videoclipes e compre produtos oficiais.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">

    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .hero-gradient {
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), #050505), 
                        url('https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
        .nav-link { transition: all 0.3s ease; cursor: pointer; }
        .nav-link:hover { color: #E11D48; }
        .active-page { color: #E11D48; font-weight: 900; border-bottom: 2px solid #E11D48; }
        
        /* Animação de transição de página */
        #app-content { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #E11D48; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <!-- NAVBAR PREMIUM -->
    <nav class="fixed top-0 w-full z-[100] glass px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter text-red-600">NILTON XAVIER</div>
        
        <!-- Menu Desktop -->
        <div class="hidden md:flex space-x-8 text-xs font-bold uppercase tracking-widest">
            <span onclick="window.navigate('home')" class="nav-link active-page" id="nav-home">Início</span>
            <span onclick="window.navigate('musica')" class="nav-link" id="nav-musica">Músicas</span>
            <span onclick="window.navigate('loja')" class="nav-link" id="nav-loja">Loja</span>
            <span onclick="window.navigate('agenda')" class="nav-link" id="nav-agenda">Agenda</span>
            <span onclick="window.navigate('apoiar')" class="nav-link text-red-500" id="nav-apoiar">Apoiar</span>
        </div>

        <div class="flex items-center space-x-4">
            <button onclick="window.navigate('fanclub')" class="bg-red-600 px-5 py-2 rounded-full text-xs font-bold hover:bg-red-700 transition">FÃ CLUBE</button>
            <a href="admin/login.html" class="text-zinc-600 hover:text-white transition"><i class="fa-solid fa-user-gear text-lg"></i></a>
        </div>
    </nav>

    <!-- CONTEÚDO DINÂMICO (SPA) -->
    <main id="app-content" class="min-h-screen pt-20">
        <!-- O conteúdo das páginas será injetado aqui pelo main.js -->
    </main>

    <!-- MINI PLAYER PERSISTENTE -->
    <div id="mini-player" class="fixed bottom-0 w-full z-[110] glass border-t border-white/5 p-3 md:px-10 flex items-center justify-between">
        <!-- Info Música -->
        <div class="flex items-center space-x-4 w-1/3">
            <img id="player-cover" src="https://via.placeholder.com/150?text=NX" class="w-12 h-12 rounded-md object-cover shadow-2xl">
            <div class="truncate">
                <h4 id="player-title" class="text-sm font-bold truncate">Selecione uma música</h4>
                <p id="player-artist" class="text-[10px] text-zinc-500 uppercase tracking-widest">Nilton Xavier</p>
            </div>
        </div>
        
        <!-- Controlos -->
        <div class="flex flex-col items-center w-1/3">
            <div class="flex items-center space-x-6">
                <button class="text-zinc-500 hover:text-white transition"><i class="fa-solid fa-backward-step"></i></button>
                <button id="play-pause" class="bg-white text-black w-10 h-10 rounded-full flex items-center justify-center hover:scale-110 transition shadow-lg">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button class="text-zinc-500 hover:text-white transition"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <!-- Barra de Progresso -->
            <div class="hidden md:flex w-full mt-2 items-center space-x-2">
                <span id="current-time" class="text-[10px] text-zinc-500">0:00</span>
                <div class="h-1 flex-1 bg-zinc-800 rounded-full overflow-hidden cursor-pointer">
                    <div id="player-progress" class="h-full bg-red-600 w-0 transition-all"></div>
                </div>
                <span id="total-time" class="text-[10px] text-zinc-500">--:--</span>
            </div>
        </div>

        <!-- Volume / Extras -->
        <div class="flex justify-end items-center space-x-4 w-1/3">
            <i class="fa-solid fa-volume-high text-zinc-500"></i>
            <div class="w-20 h-1 bg-zinc-800 rounded-full hidden md:block">
                <div class="h-full bg-white w-2/3"></div>
            </div>
        </div>
    </div>

    <!-- FOOTER / CONTADOR REAL -->
    <footer class="p-10 text-center border-t border-white/5 bg-black">
        <div class="flex justify-center space-x-8 mb-8 text-xl text-zinc-500">
            <a href="#" class="hover:text-red-600 transition"><i class="fab fa-instagram"></i></a>
            <a href="#" class="hover:text-red-600 transition"><i class="fab fa-youtube"></i></a>
            <a href="#" class="hover:text-red-600 transition"><i class="fab fa-spotify"></i></a>
            <a href="#" class="hover:text-red-600 transition"><i class="fab fa-facebook"></i></a>
        </div>
        <p class="text-zinc-600 text-xs uppercase tracking-[0.3em]">© 2024 Nilton Xavier – Mr Dono Delas</p>
        <div class="mt-4 inline-block glass px-4 py-1 rounded-full text-[10px] text-zinc-500">
            VISITANTES OFICIAIS: <span id="visitor-count" class="text-red-500 font-bold">...</span>
        </div>
    </footer>

    <!-- FIREBASE CONFIG & ROUTER -->
    <script type="module">
        import { db, analytics } from './assets/js/firebase-config.js';
        import { doc, updateDoc, increment, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { logEvent } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        // 1. CONTADOR DE VISITANTES REAL
        async function updateVisitorCount() {
            const statsRef = doc(db, "stats", "visitors");
            try {
                await updateDoc(statsRef, { count: increment(1) });
                const snap = await getDoc(statsRef);
                document.getElementById('visitor-count').innerText = snap.data().count.toLocaleString();
                logEvent(analytics, 'page_view');
            } catch (e) {
                // Se o documento não existir, cria-o
                await setDoc(statsRef, { count: 1 });
                document.getElementById('visitor-count').innerText = "1";
            }
        }
        updateVisitorCount();

        // 2. IMPORTAR O MOTOR DO SITE (MAIN.JS)
        import './assets/js/main.js';
    </script>

    <!-- SERVICE WORKER (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {
                console.log("PWA: Offline mode ready.");
            });
        }
    </script>
</body>
</html>
