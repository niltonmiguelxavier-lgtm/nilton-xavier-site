<!DOCTYPE html>
<html lang="pt-pt" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilton Xavier – Mr Dono Delas</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.12.16/framer-motion.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .active-nav { color: #E11D48; border-bottom: 2px solid #E11D48; }
        /* Animação de entrada */
        .page-enter { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <!-- Navbar Premium -->
    <nav class="fixed top-0 w-full z-[100] glass px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter text-red-600">NILTON XAVIER</div>
        <div class="hidden md:flex space-x-8 text-xs font-bold uppercase tracking-widest">
            <button onclick="navigate('home')" class="nav-link active-nav">Início</button>
            <button onclick="navigate('musica')" class="nav-link">Músicas</button>
            <button onclick="navigate('loja')" class="nav-link">Loja</button>
            <button onclick="navigate('agenda')" class="nav-link">Agenda</button>
            <button onclick="navigate('apoiar')" class="nav-link text-red-500">Apoiar</button>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="navigate('fanclub')" class="bg-red-600 px-5 py-2 rounded-full text-xs font-bold">FÃ CLUBE</button>
            <a href="admin/login.html" class="text-zinc-600 hover:text-white"><i class="fa-solid fa-user-gear"></i></a>
        </div>
    </nav>

    <!-- Conteúdo Dinâmico -->
    <main id="app-content" class="pt-20 min-h-screen">
        <!-- O conteúdo das páginas será injetado aqui pelo router.js -->
    </main>

    <!-- Mini Player Persistente -->
    <div id="mini-player" class="fixed bottom-0 w-full z-[110] glass border-t border-white/5 p-3 md:px-10 flex items-center justify-between">
        <div class="flex items-center space-x-4 w-1/3">
            <img id="player-cover" src="https://via.placeholder.com/50" class="w-12 h-12 rounded-md object-cover shadow-lg">
            <div class="truncate">
                <h4 id="player-title" class="text-sm font-bold truncate">Nenhuma música</h4>
                <p id="player-artist" class="text-xs text-zinc-400">Nilton Xavier</p>
            </div>
        </div>
        
        <div class="flex flex-col items-center w-1/3">
            <div class="flex items-center space-x-6">
                <button class="hover:text-red-500"><i class="fa-solid fa-backward-step"></i></button>
                <button id="play-pause" class="bg-white text-black w-10 h-10 rounded-full flex items-center justify-center hover:scale-110 transition">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button class="hover:text-red-500"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <div class="hidden md:flex w-full mt-2 items-center space-x-2">
                <span class="text-[10px] text-zinc-500">0:00</span>
                <div class="h-1 flex-1 bg-zinc-800 rounded-full overflow-hidden">
                    <div id="player-progress" class="h-full bg-red-600 w-0"></div>
                </div>
                <span class="text-[10px] text-zinc-500">3:45</span>
            </div>
        </div>

        <div class="flex justify-end items-center space-x-4 w-1/3">
            <i class="fa-solid fa-volume-high text-zinc-400"></i>
            <div class="w-20 h-1 bg-zinc-800 rounded-full hidden md:block">
                <div class="h-full bg-white w-1/2"></div>
            </div>
        </div>
    </div>

    <!-- Scripts de Configuração -->
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
                                                                                                                                                                                                                            <script type="module">
                                                                                                                                                                                                                                    import { db } from './assets/js/firebase-config.js';
                                                                                                                                                                                                                                            import { doc, updateDoc, increment, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
                                                                                                                                                                                                                                                    async function counter() {
                                                                                                                                                                                                                                                                const ref = doc(db, "stats", "visitors");
                                                                                                                                                                                                                                                                            try { await updateDoc(ref, { count: increment(1) });
                                                                                                                                                                                                                                                                                        const s = await getDoc(ref); document.getElementById('v-count').innerText = s.data().count;
                                                                                                                                                                                                                                                                                                    } catch { await setDoc(ref, { count: 1 }); }
                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                    counter();
                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                        </html>
