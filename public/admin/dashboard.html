<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Admin Premium | Nilton Xavier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0a0a0a] text-white flex">

    <!-- Sidebar -->
    <aside class="w-64 h-screen bg-black border-r border-white/5 p-6 fixed">
        <div class="text-red-600 font-black text-2xl mb-10">NX ADMIN</div>
        <nav class="space-y-2">
            <button class="w-full text-left p-3 rounded-lg bg-red-600/10 text-red-500 font-bold"><i class="fa-solid fa-chart-line mr-3"></i> Dashboard</button>
            <button class="w-full text-left p-3 rounded-lg hover:bg-white/5 transition"><i class="fa-solid fa-music mr-3"></i> Músicas</button>
            <button class="w-full text-left p-3 rounded-lg hover:bg-white/5 transition"><i class="fa-solid fa-cart-shopping mr-3"></i> Loja</button>
            <button class="w-full text-left p-3 rounded-lg hover:bg-white/5 transition"><i class="fa-solid fa-calendar-days mr-3"></i> Agenda</button>
            <button class="w-full text-left p-3 rounded-lg hover:bg-white/5 transition text-zinc-500"><i class="fa-solid fa-right-from-bracket mr-3"></i> Sair</button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 flex-1 p-10">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black">Bem-vindo, Nilton</h1>
            <div class="flex space-x-4">
                <div class="glass px-4 py-2 rounded-lg text-sm">Visitantes: <span class="text-red-500 font-bold">1,240</span></div>
                <div class="glass px-4 py-2 rounded-lg text-sm">Vendas: <span class="text-green-500 font-bold">12,500 MZN</span></div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Card de Upload -->
            <div class="col-span-2 glass p-8 rounded-3xl">
                <h3 class="text-xl font-bold mb-6">Publicar Novo Conteúdo</h3>
                <form id="uploadForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="title" placeholder="Título" class="bg-white/5 p-4 rounded-xl border border-white/10 focus:border-red-600 outline-none">
                        <select id="category" class="bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                            <option value="song">Música (Single)</option>
                            <option value="album">Álbum / EP</option>
                            <option value="product">Produto Loja</option>
                        </select>
                    </div>
                    <textarea id="desc" placeholder="Descrição / Letra" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 h-32 outline-none"></textarea>
                    <div class="border-2 border-dashed border-white/10 p-10 rounded-xl text-center hover:border-red-600 transition cursor-pointer">
                        <input type="file" id="file" class="hidden">
                        <label for="file" class="cursor-pointer">
                            <i class="fa-solid fa-cloud-arrow-up text-4xl mb-4 text-zinc-600"></i>
                            <p class="text-zinc-400">Arraste a capa ou ficheiro aqui</p>
                        </label>
                    </div>
                    <button type="submit" class="w-full bg-red-600 py-4 rounded-xl font-black text-lg shadow-lg shadow-red-600/20">PUBLICAR AGORA</button>
                </form>
            </div>

            <!-- Notificações / Mensagens -->
            <div class="glass p-8 rounded-3xl">
                <h3 class="text-xl font-bold mb-6">Mensagens dos Fãs</h3>
                <div class="space-y-4 max-h-[400px] overflow-y-auto">
                    <div class="bg-white/5 p-4 rounded-xl">
                        <p class="text-xs text-red-500 font-bold">@fã_numero1</p>
                        <p class="text-sm mt-1">"Mr Dono Delas, quando sai o próximo show em Maputo?"</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db, storage } from '../assets/js/firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        onAuthStateChanged(auth, user => {
            if(!user) window.location.href = 'login.html';
        });
    </script>
</body>
</html>
