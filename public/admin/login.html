<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
        <title>Login Admin</title>
            <script src="https://cdn.tailwindcss.com"></script>
            </head>
            <body class="bg-black text-white flex items-center justify-center h-screen">
                <div class="bg-zinc-900 p-8 rounded-2xl w-96 border border-white/10">
                        <h2 class="text-2xl font-bold mb-6 text-center text-red-600">ADMIN LOGIN</h2>
                                <input type="email" id="email" placeholder="Email" class="w-full p-3 mb-4 bg-zinc-800 rounded">
                                        <input type="password" id="pass" placeholder="Senha" class="w-full p-3 mb-6 bg-zinc-800 rounded">
                                                <button id="btnLogin" class="w-full bg-red-600 py-3 rounded font-bold">ENTRAR</button>
                                                    </div>
                                                        <script type="module">
                                                                import { auth } from '../assets/js/firebase-config.js';
                                                                        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
                                                                                document.getElementById('btnLogin').onclick = async () => {
                                                                                            try {
                                                                                                            await signInWithEmailAndPassword(auth, email.value, pass.value);
                                                                                                                            window.location.href = 'dashboard.html';
                                                                                                                                        } catch { alert("Erro de acesso!"); }
                                                                                                                                                };
                                                                                                                                                    </script>
                                                                                                                                                    </body>
                                                                                                                                                    </html>
